name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - frontend
          - backend
          - jdbc

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          
      - name: Install Playwright browsers
        run: |
          cd web
          npm ci
          npx playwright install --with-deps chromium
          
      - name: Build MystiSql Gateway
        run: |
          go mod download
          go build -o bin/mystisql ./cmd/mystisql
          
      - name: Run E2E Tests
        id: run_tests
        run: |
          chmod +x scripts/run-e2e-tests.sh
          TEST_TYPE=${{ github.event.inputs.test_type || 'all' }}
          ./scripts/run-e2e-tests.sh $TEST_TYPE
        continue-on-error: true
        
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-reports
          path: test-reports/e2e-test-report.tar.gz
          retention-days: 30
          
      - name: Check Test Results
        if: steps.run_tests.outcome == 'failure'
        run: |
          echo "::error::E2E 测试失败，请查看测试报告了解详情"
          exit 1
          
      - name: Test Summary
        if: always()
        run: |
          echo "## E2E 测试结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f test-reports/e2e-test-report.tar.gz ]; then
            echo "✅ 测试报告已生成并上传" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📥 请下载 \`e2e-test-reports\` artifact 查看详细报告" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 测试报告生成失败" >> $GITHUB_STEP_SUMMARY
          fi
