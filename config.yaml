server:
  host: "0.0.0.0"
  port: 8081
  mode: "debug"

auth:
  enabled: true
  token:
    secret: "change-this-secret-in-production"
    expire: "24h"
  whitelist:
    - "/health"
    - "/api/v1/auth/login"

audit:
  enabled: true
  logFile: "/var/log/mystisql/audit.log"
  retentionDays: 30

validator:
  enabled: true
  dangerousOperations:
    - "DROP"
    - "TRUNCATE"
    - "DELETE_WITHOUT_WHERE"
    - "UPDATE_WITHOUT_WHERE"
  whitelist: []
  blacklist: []

websocket:
  enabled: true
  maxConnections: 1000
  idleTimeout: "10m"
  maxConcurrentQueries: 5

discovery:
  type: "static"

instances:
  - name: "test-mysql"
    type: "mysql"
    host: "localhost"
    port: 13306
    username: "root"
    password: "test123456"
    database: "mystisql_test"
