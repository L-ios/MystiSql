# MystiSql 测试环境 - ClickHouse
#
# 端口说明:
#   18123 -> 8123  HTTP 接口 (REST API)
#   19000 -> 9000  Native TCP (Go 驱动使用此端口)
#
# 使用方法:
#   podman-compose up -d
#   podman-compose down -v

services:
  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:latest
    container_name: mystisql-clickhouse
    restart: unless-stopped
    ports:
      - "18123:8123"
      - "19000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: test123456
      CLICKHOUSE_DB: mystisql_test
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query=SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  clickhouse-data:
