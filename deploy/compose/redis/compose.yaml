# MystiSql 测试环境 - Redis 7
#
# 使用方法:
#   podman-compose up -d
#   podman-compose down -v

services:
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: mystisql-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass test123456
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "test123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  redis-data:
